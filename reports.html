<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentGuard | My Inspection Reports</title>
    <meta name="description" content="View all your saved RentGuard inspection reports with annotated photos, GPS location, and damage notes.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="script.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#3b82f6',
                    },
                    keyframes: {
                        slideUp: {
                            from: { opacity: '0', transform: 'translateY(24px)' },
                            to: { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.4s ease both',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-gray-100">

    
    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-700/60 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 flex items-center gap-3 py-3">
            <a href="index.html" id="back_to_home"
               class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-800 hover:bg-slate-700 text-gray-300 hover:text-white transition-all border border-slate-600">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </a>
            <div class="flex-1 min-w-0">
                <h1 class="text-white font-bold text-lg leading-tight">My Inspection Reports</h1>
                <p class="text-gray-400 text-xs" id="report_count_label">Loading reports…</p>
            </div>
      
            <button id="clear_all_btn"
                class="hidden items-center gap-1.5 px-3 py-1.5 rounded-lg border border-red-800 text-red-400 hover:bg-red-900/30 hover:text-red-300 text-xs font-semibold transition-all" onclick="clearAllReports()">
                <i class="fa-solid fa-trash"></i> Clear All
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">

     
        <div id="empty_state" class="hidden flex-col items-center justify-center py-28 text-center">
            <div class="w-24 h-24 rounded-full bg-slate-800 flex items-center justify-center mb-6 border border-slate-700">
                <i class="fa-solid fa-camera-slash text-4xl text-slate-500"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-300 mb-2">No Reports Saved Yet</h2>
            <p class="text-gray-500 text-sm mb-8 max-w-xs">Complete an inspection on the main page to save your first annotated photo report here.</p>
            <a href="index.html"
               class="bg-primary hover:bg-blue-800 text-white px-6 py-3 rounded-xl font-semibold transition-all shadow-lg hover:shadow-blue-900/40 flex items-center gap-2">
                <i class="fa-solid fa-camera"></i> Start Inspection
            </a>
        </div>

      
        <div id="reports_grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
           
        </div>

    </main>

   
    <div id="lightbox"
         role="dialog"
         aria-modal="true"
         aria-label="Photo viewer"
         class="hidden fixed inset-0 z-[9999] bg-black/[0.92] backdrop-blur-[4px] items-center justify-center">
        <button id="lightbox_close"
            class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 hover:bg-white/25 text-white text-xl flex items-center justify-center transition-all z-10" onclick="closeLightbox()">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <img id="lightbox_img" src="" alt="Full size inspection photo"
             class="max-w-[92vw] max-h-[88vh] rounded-xl shadow-[0_24px_80px_rgba(0,0,0,0.8)]">
    </div>

   
    <div id="delete_modal" class="hidden fixed inset-0 z-[9998] bg-black/70 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
            <div class="w-12 h-12 rounded-full bg-red-900/40 flex items-center justify-center mb-4 border border-red-800">
                <i class="fa-solid fa-triangle-exclamation text-red-400 text-xl"></i>
            </div>
            <h3 class="text-white font-bold text-lg mb-1">Delete Report?</h3>
            <p class="text-gray-400 text-sm mb-6">This action cannot be undone. The photo and notes will be permanently removed from this device.</p>
            <div class="flex gap-3">
                <button id="delete_cancel_btn" class="flex-1 py-2.5 rounded-xl border border-slate-600 text-gray-300 hover:bg-slate-700 font-semibold text-sm transition-all" onclick="cancelDelete()">
                    Cancel
                </button>
                <button id="delete_confirm_btn" class="flex-1 py-2.5 rounded-xl bg-red-600 hover:bg-red-700 text-white font-semibold text-sm transition-all" onclick="confirmDelete()">
                    Yes, Delete
                </button>
            </div>
        </div>
    </div>

    <script>
        appInit();
    </script>


</body>
</html>
