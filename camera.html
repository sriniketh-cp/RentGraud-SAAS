<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-width=device-width,initial-scale=1.0">
     <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
     
      <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af', // Blue 800
                        secondary: '#3b82f6', // Blue 500
                    }
                }
            }
        }
    </script>
    <script src="script.js"></script>
</head>
<body>
<div class="max-w-md mx-auto mt-8 p-4 bg-white rounded-lg shadow-md border">
    <h2 class="text-xl font-bold mb-4">Review & Annotate</h2>
    
    <img id="photo_preview" alt="Captured Photo" class="w-full rounded-lg mb-4 border" />
    
    <label for="damageNotes" class="block text-sm font-bold text-gray-700 mb-2">
        Damage Description
    </label>
    <div class="relative mb-4">
        <textarea 
            id="damageNotes" 
            rows="3" 
            class="w-full border rounded-lg p-3 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500" 
            placeholder="Tap the mic to describe the damage..."
        ></textarea>
        
        <button 
            id="micBtn" 
            class="absolute bottom-3 right-3 p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors"
            title="Dictate Notes"
        >
            🎙️
        </button>
    </div>
    <p id="micStatus" class="text-xs text-red-500 font-bold mb-4 hidden animate-pulse">Listening... Speak now.</p>
    
    <button id="save_photo_button" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow-lg hover:bg-blue-700">
        Save Photo + Location + Notes
    </button>
    <button id="shareBtn" class="hidden w-full mt-4 border-2 border-blue-600 text-blue-600 bg-white py-3 rounded-lg font-bold shadow hover:bg-blue-50 transition">
        📤 Share with Landlord
    </button>
</div>
</body>
</html>
